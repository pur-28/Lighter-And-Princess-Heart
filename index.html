<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Lighter & Princess Heart</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div id="overlay">
        <div class="play-btn">❤️</div>
        <p>Ignite the heart</p>
        <div class="touch-hint" style="position: relative; bottom: auto; margin-top: 30px; opacity: 0.6;"> Click on
            Heart </div>
    </div>

    <audio id="bgMusic" loop preload="auto">
        <source src="music.mp3" type="audio/mpeg">
    </audio>

    <div class="canvas-wrapper">
        <canvas id="heartCanvas"></canvas>
    </div>
    <div class="touch-hint" id="hintMsg">✨ The Breathing Heart & Leaping Particles ✨</div>

    <script src="script.js"></script>
</body>

</html>
